<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Choose a date and time for your Pulse VR booking." />
		<meta name="robots" content="index,follow" />
		<meta name="theme-color" content="#0a0d14" />

		<title>Pulse VR | Date & Time</title>

		<link rel="canonical"
			href="https://rylvion.github.io/pulse-vr/bookings/date-time/" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Pulse VR" />
		<meta property="og:title"
			content="Pulse VR | Date & Time" />

		<!-- open graph -->
		<meta property="og:description"
			content="Choose a date and time for your Pulse VR booking." />
		<meta property="og:url"
			content="https://rylvion.github.io/pulse-vr/bookings/date-time/" />

		<!-- twitter-->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title"
			content="Pulse VR | Date & Time" />
		<meta name="twitter:description"
			content="Choose a date and time for your Pulse VR booking." />

		<link rel="icon" type="image/png" sizes="32x32"
			href="../../assets/favicons/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16"
			href="../../assets/favicons/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180"
			href="../../assets/favicons/apple-touch-icon.png" />
		<link rel="shortcut icon" href="../../assets/favicons/favicon.ico" />
		<link rel="manifest" href="../../assets/favicons/site.webmanifest" />

		<!-- CSS -->
		<link rel="stylesheet" href="../../../css/styles.css" />

		<!-- JS -->
		<script src="../../../js/theme-init.js" defer></script>
	</head>
	<body class="g-theme" data-booking-step="date">
		<a class="skip-link" href="#bookings-page">Skip to content</a>
		<header>
			<nav id="navbar" aria-label="Primary">
				<a class="brand" href="../../" aria-label="Pulse VR home">
					<img
						class="brand-mark"
						src="https://placehold.co/88x88/6f25f6/ffffff?text=PV"
						width="44"
						height="44"
						alt="Pulse VR logo"
						decoding="async" />
					<span class="brand-title">Pulse VR</span>
				</a>
				<ul>
					<li class="navlink"><a href="../../">Home</a></li>
					<li class="navlink">
						<a href="../../game-library/">Game Library</a>
					</li>
					<li class="navlink">
						<a href="../" aria-current="page">Bookings</a>
					</li>
					<li class="navlink"><a href="../../pricing/">Pricing</a></li>
					<li class="navlink"><a href="../../about/">About</a></li>
					<li class="navlink"><a href="../../accessibility/">Accessibility</a></li>
					<li id="profile">
						<a href="../../account/" aria-label="Open account settings">
							<svg
								class="icon"
								viewBox="0 0 20 20"
								fill="currentColor"
								xmlns="http://www.w3.org/2000/svg">
								<path
									d="M10 10a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm3.758.673C15.124 9.574 16 7.89 16 6c0-3.314-2.686-6-6-6S4 2.686 4 6c0 1.89.876 3.574 2.242 4.673C2.583 12.048 0 15.445 0 20h20c0-4.555-2.583-7.952-6.242-9.327Z" />
							</svg>
						</a>
					</li>
				</ul>
			</nav>
		</header>
		<main id="bookings-page" class="booking-step-page" tabindex="-1">
			<ol id="booking-steps" aria-label="Booking process steps">
				<li data-step="select"><span>1</span> Select Game</li>
				<li data-step="date"><span>2</span> Date &amp; Time</li>
				<li data-step="group"><span>3</span> Group Size</li>
				<li data-step="confirm"><span>4</span> Confirm</li>
			</ol>
			<section class="booking-form-card" aria-labelledby="date-time-title">
				<h1 id="date-time-title">Choose Date and Time</h1>

				<div class="booking-game-media">
					<img id="flow-game-image" alt="Selected game image preview" />
				</div>

				<p id="flow-game-details">Loading selected game details...</p>

				<form id="date-time-form">
					<label for="booking-date">Date
						<input id="booking-date" name="date" type="date" required
							aria-describedby="booking-date-error" />
					</label>

					<label for="booking-time">Time Slot
						<select id="booking-time" name="time">
							<option value="10:00">10:00</option>
							<option value="12:00">12:00</option>
							<option value="14:00" selected>14:00</option>
							<option value="16:00">16:00</option>
							<option value="18:00">18:00</option>
						</select>
					</label>

					<p class="error" id="booking-date-error" aria-live="polite"></p>
				</form>

				<p class="step-actions">
					<a class="action-secondary" href="../">Back</a>
					<a id="next-step-link" class="action-primary" href="../group-size/">Next:
						Group Size</a>
				</p>
			</section>
		</main>
		<footer>
			<p>&copy; 2026 Pulse VR. All rights reserved.</p>
		</footer>
		<script type="module" src="../../../js/booking-flow.js"></script>
	</body>
</html>
